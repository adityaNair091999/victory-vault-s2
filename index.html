<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Victory Vault Season 2 — Fantasy Premier League Mini-League Dashboard. Track standings, monthly prizes, Last Man Standing, Free Hit, Cup, and highest GW scores.">
    <title>Victory Vault Season 2 | FPL Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <div class="loader-ring"></div>
            <div class="loader-ring"></div>
            <div class="loader-text">
                <span class="loader-brand">Victory Vault</span>
                <span id="loading-status" class="loader-status">Initializing...</span>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="app-header">
        <div class="header-inner">
            <div class="header-brand">
                <div class="brand-icon">⚽</div>
                <div class="brand-text">
                    <h1>Victory Vault <span class="season-tag">Season 2</span></h1>
                    <p class="brand-subtitle">FPL Mini-League Dashboard</p>
                </div>
            </div>
            <div class="header-meta">
                <div class="meta-pills">
                    <span class="meta-pill gw-pill" id="current-gw">GW —</span>
                    <span class="meta-pill players-pill">18 Players</span>

                </div>
                <div class="header-actions">
                    <span id="last-updated" class="last-updated">Not yet loaded</span>
                    <button id="refresh-btn" class="refresh-btn" onclick="APP.forceRefresh()">
                        <svg class="refresh-icon" viewBox="0 0 24 24" width="18" height="18" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                        Refresh
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tab-nav">
        <div class="tab-nav-inner">
            <div id="tab-bar" class="tab-bar"></div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="app-main">
        <div id="tab-content" class="tab-content">
            <!-- Content injected by JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <div class="footer-inner">
            <span>Victory Vault Season 2 · 18 Players</span>
            <span>Data powered by FPL API</span>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/competitions.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
